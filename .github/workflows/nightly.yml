name: release

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:

env:
  IMAGE: benjithatfoxguy/bclone

concurrency:
  group: snapshot-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  setup:
    name: Determine build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.config.outputs.matrix }}
      is_nightly: ${{ steps.config.outputs.is_nightly }}
      build_platforms: ${{ steps.config.outputs.build_platforms }}
    steps:
      - name: Determine matrix and build platforms
        id: config
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo 'is_nightly=false' >> "$GITHUB_OUTPUT"
            echo 'matrix=["linux"]' >> "$GITHUB_OUTPUT"
            echo 'build_platforms=^(linux/amd64|linux/arm64)' >> "$GITHUB_OUTPUT"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo 'is_nightly=true' >> "$GITHUB_OUTPUT"
            echo 'matrix=["linux","windows","mac_amd64","mac_arm64"]' >> "$GITHUB_OUTPUT"
            echo 'build_platforms=^(linux/amd64|linux/arm64|linux/arm-v7)' >> "$GITHUB_OUTPUT"
          else
            echo 'is_nightly=false' >> "$GITHUB_OUTPUT"
            echo 'matrix=["linux","windows","mac_amd64","mac_arm64"]' >> "$GITHUB_OUTPUT"
            echo 'build_platforms=^(linux/amd64|linux/arm64|linux/arm-v7)' >> "$GITHUB_OUTPUT"
          fi

  build:
    timeout-minutes: 60
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        job_name: ${{ fromJSON(needs.setup.outputs.matrix) }}

        include:
          - job_name: linux
            os: ubuntu-latest
            go: '>=1.24.0-rc.1'
            gotags: cmount,noselfupdate
            cgo: '0'
            build_flags: '-include "^(linux/amd64|linux/arm64|linux/arm-v7)"'

          - job_name: windows
            os: windows-latest
            go: '>=1.24.0-rc.1'
            gotags: cmount,noselfupdate
            cgo: '0'
            build_flags: '-include "^(windows/amd64|windows/arm64)"'
            build_args: '-buildmode exe'

          - job_name: mac_amd64
            os: macos-latest
            go: '>=1.23.0-rc.1'
            gotags: 'cmount,noselfupdate'
            build_flags: '-include "^darwin/amd64" -cgo'

          - job_name: mac_arm64
            os: macos-latest
            go: '>=1.23.0-rc.1'
            gotags: 'cmount,noselfupdate'
            build_flags: '-include "^darwin/arm64" -cgo -macos-arch arm64 -cgo-cflags=-I/usr/local/include -cgo-ldflags=-L/usr/local/lib'

    name: ${{ matrix.job_name }}

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Set environment variables
        shell: bash
        run: |
          echo 'GOTAGS=${{ matrix.gotags }}' >> $GITHUB_ENV
          echo 'BUILD_FLAGS=${{ matrix.build_flags }}' >> $GITHUB_ENV
          echo 'BUILD_ARGS=${{ matrix.build_args }}' >> $GITHUB_ENV
          if [[ "${{ matrix.cgo }}" != "" ]]; then echo 'CGO_ENABLED=${{ matrix.cgo }}' >> $GITHUB_ENV ; fi

      - name: Override build platforms for Linux
        shell: bash
        if: matrix.job_name == 'linux'
        run: |
          echo 'BUILD_FLAGS=-include "${{ needs.setup.outputs.build_platforms }}"' >> $GITHUB_ENV

      - name: Install Libraries on Linux
        shell: bash
        run: |
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse
          sudo chown root:$USER /etc/fuse.conf
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse-dev rpm pkg-config git-annex git-annex-remote-rclone nfs-common
        if: matrix.os == 'ubuntu-latest'

      - name: Install Libraries on macOS
        shell: bash
        run: |
          unset HOMEBREW_NO_INSTALL_FROM_API
          brew untap --force homebrew/core
          brew untap --force homebrew/cask
          brew update
          brew install --cask macfuse
          brew install git-annex git-annex-remote-rclone
        if: matrix.os == 'macos-latest'

      - name: Install Libraries on Windows
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          choco install -y winfsp
          choco install zip --source="bin"
          echo "CPATH=C:\Program Files\WinFsp\inc\fuse;C:\Program Files (x86)\WinFsp\inc\fuse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($env:GOARCH -eq "386") {
            choco install -y mingw --forcex86 --force
            echo "C:\\ProgramData\\chocolatey\\lib\\mingw\\tools\\install\\mingw32\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          $path = (get-command mingw32-make.exe).Path
          Copy-Item -Path $path -Destination (Join-Path (Split-Path -Path $path) 'make.exe')
        if: matrix.os == 'windows-latest'

      - name: Print Go version and environment
        shell: bash
        run: |
          printf "Using go at: $(which go)\n"
          printf "Go version: $(go version)\n"
          printf "\n\nGo environment:\n\n"
          go env
          printf "\n\nRclone environment:\n\n"
          make vars
          printf "\n\nSystem environment:\n\n"
          env

      - name: Build bclone
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then make release_dep_linux ; fi
          make cross

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: bclone-${{ matrix.job_name }}
          path: ${{ github.workspace }}/build/**/*
          retention-days: 3

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [setup, build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.0-rc.1'
          check-latest: true

      - name: Get build tag
        id: get_tag
        run: echo "tag=$(make -s version)" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/build
          pattern: bclone-*
          merge-multiple: true

      - name: Copy Artifacts
        run: |
          mkdir build
          cp -r /tmp/build/* build/

      - name: Force-update nightly tag
        if: github.event_name == 'push' && needs.setup.outputs.is_nightly == 'true'
        run: |
          git tag -f nightly ${{ github.sha }}
          git push origin -f refs/tags/nightly

      - name: Create Nightly Release
        if: github.event_name == 'push' && needs.setup.outputs.is_nightly == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: Nightly (${{ steps.get_tag.outputs.tag }})
          tag_name: nightly
          prerelease: true
          body: |
            Nightly build from main branch.
            Version: ${{ steps.get_tag.outputs.tag }}
            Commit: ${{ github.sha }}
            Built at: ${{ github.event.head_commit.timestamp }}
          files: build/**/*
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Tagged Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [setup, build]
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.0-rc.1'
          check-latest: true

      - name: Get build tag
        id: get_tag
        run: echo "tag=$(make -s version)" >> $GITHUB_OUTPUT

      - name: Determine Docker tag and platforms
        id: docker_config
        run: |
          TAG="${GITHUB_REF#refs/heads/}"
          TAG="${TAG#refs/tags/}"
          TAG="${TAG//\//-}"
          PLATFORMS="linux/amd64,linux/arm64,linux/arm/v7"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            PLATFORMS="linux/amd64,linux/arm64"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"

      - name: Download All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/build
          pattern: bclone-*
          merge-multiple: true

      - name: Copy Artifacts
        run: |
          mkdir build
          cp -r /tmp/build/* build/

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.docker_config.outputs.platforms }}
          build-args: |
            VERSION=${{ steps.get_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.get_tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ env.IMAGE }}
            org.opencontainers.image.description=bclone release Docker image
          tags: |
            ghcr.io/${{ env.IMAGE }}:${{ steps.docker_config.outputs.tag }}
